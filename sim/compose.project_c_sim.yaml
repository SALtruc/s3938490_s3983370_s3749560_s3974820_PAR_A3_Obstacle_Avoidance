# ROSbot Gazebo + Project C test harness.
#
# Linux/WSL2:
#   xhost +local:docker
#   docker compose -f sim/compose.project_c_sim.yaml up
#
# The simulation publishes /scan_filtered and /oak/stereo/depth/points. Project C
# is launched with those topics and with simulated ToF disabled because the
# Gazebo VL53L0X topics are LaserScan, while the real robot publishes Range.

x-common-config: &common-config
  network_mode: host
  ipc: host
  environment:
    - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    - FASTRTPS_DEFAULT_PROFILES_FILE=/ros2_ws/src/rosbot_ros/docker/dds-config-udp.xml

services:
  rosbot_sim:
    image: husarion/rosbot-gazebo:jazzy
    <<: *common-config
    devices:
      - /dev/dri:/dev/dri
      - /dev/input:/dev/input:ro
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - FASTRTPS_DEFAULT_PROFILES_FILE=/ros2_ws/src/rosbot_ros/docker/dds-config-udp.xml
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: >
      ros2 launch rosbot_gazebo simulation.yaml
        robot_model:=rosbot

  project_c:
    image: husarion/rosbot-gazebo:jazzy
    <<: *common-config
    depends_on:
      - rosbot_sim
    volumes:
      - ../src/rosbot_obstacle_avoidance:/project_ws/src/rosbot_obstacle_avoidance:rw
    command: >
      bash -lc "
        apt-get update &&
        apt-get install -y --no-install-recommends
          python3-colcon-common-extensions
          python3-numpy
          ros-jazzy-cv-bridge
          ros-jazzy-nav2-collision-monitor
          ros-jazzy-nav2-lifecycle-manager
          ros-jazzy-sensor-msgs-py &&
        cd /project_ws &&
        colcon build --symlink-install --packages-select rosbot_obstacle_avoidance &&
        source install/setup.bash &&
        sleep 8 &&
        ros2 launch rosbot_obstacle_avoidance project_c_safety.launch.py
          scan_topic:=/scan_filtered
          pointcloud_topic:=/oak/stereo/depth/points
          use_tof:=false
          cmd_vel_topic:=/cmd_vel
          debug_decisions:=true
      "
